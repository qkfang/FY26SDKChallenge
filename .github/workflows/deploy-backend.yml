name: Deploy Backend to Azure App Service

on:
  push:
    branches: [main]
    paths:
      - "src/backend/**"
      - "src/shared/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install backend dependencies
        working-directory: src/backend
        run: npm ci

      - name: Build backend
        working-directory: src/backend
        run: npm run build

      - name: Prepare deployment package
        working-directory: src/backend
        run: |
          cp package.json dist/
          cp package-lock.json dist/
          cd dist
          npm ci --omit=dev
          node -e "const p=require('./package.json'); p.main='index.js'; p.scripts.start='node index.js'; require('fs').writeFileSync('package.json',JSON.stringify(p,null,2))"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: src/backend/dist

  deploy-dev:
    needs: build
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-dist
          path: dist

      - name: Azure CLI Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ghcsdk-dev-api
          package: dist

  deploy-qa:
    needs: deploy-dev
    runs-on: ubuntu-latest
    environment: qa
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-dist
          path: dist

      - name: Azure CLI Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ghcsdk-qa-api
          package: dist

  deploy-prod:
    needs: deploy-qa
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-dist
          path: dist

      - name: Azure CLI Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ghcsdk-prod-api
          package: dist
