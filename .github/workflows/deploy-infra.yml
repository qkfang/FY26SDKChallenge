name: Deploy Infrastructure (Bicep)

on:
  push:
    branches: [main]
    paths:
      - "bicep/**"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Azure CLI Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Bicep
        id: deploy
        working-directory: bicep
        run: |
          result=$(az deployment group create \
            -g "rg-ghcsdk-dev" \
            --template-file main.bicep \
            --parameters main.dev.bicepparam \
            --query "properties.outputs" \
            -o json)
          echo "STATIC_WEB_APP_HOSTNAME=$(echo $result | jq -r '.staticWebAppHostname.value')" >> $GITHUB_OUTPUT
          echo "APP_SERVICE_HOSTNAME=$(echo $result | jq -r '.appServiceHostname.value')" >> $GITHUB_OUTPUT

      - name: Print Resource Details
        run: |
          echo "Environment:    dev"
          echo "Static Web App: ${{ steps.deploy.outputs.STATIC_WEB_APP_HOSTNAME }}"
          echo "App Service:    ${{ steps.deploy.outputs.APP_SERVICE_HOSTNAME }}"

  deploy-qa:
    needs: deploy-dev
    runs-on: ubuntu-latest
    environment: qa
    steps:
      - uses: actions/checkout@v4

      - name: Azure CLI Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Bicep
        id: deploy
        working-directory: bicep
        run: |
          result=$(az deployment group create \
            -g "rg-ghcsdk-qa" \
            --template-file main.bicep \
            --parameters main.qa.bicepparam \
            --query "properties.outputs" \
            -o json)
          echo "STATIC_WEB_APP_HOSTNAME=$(echo $result | jq -r '.staticWebAppHostname.value')" >> $GITHUB_OUTPUT
          echo "APP_SERVICE_HOSTNAME=$(echo $result | jq -r '.appServiceHostname.value')" >> $GITHUB_OUTPUT

      - name: Print Resource Details
        run: |
          echo "Environment:    qa"
          echo "Static Web App: ${{ steps.deploy.outputs.STATIC_WEB_APP_HOSTNAME }}"
          echo "App Service:    ${{ steps.deploy.outputs.APP_SERVICE_HOSTNAME }}"

  deploy-prod:
    needs: deploy-qa
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - name: Azure CLI Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Bicep
        id: deploy
        working-directory: bicep
        run: |
          result=$(az deployment group create \
            -g "rg-ghcsdk-prod" \
            --template-file main.bicep \
            --parameters main.prod.bicepparam \
            --query "properties.outputs" \
            -o json)
          echo "STATIC_WEB_APP_HOSTNAME=$(echo $result | jq -r '.staticWebAppHostname.value')" >> $GITHUB_OUTPUT
          echo "APP_SERVICE_HOSTNAME=$(echo $result | jq -r '.appServiceHostname.value')" >> $GITHUB_OUTPUT

      - name: Print Resource Details
        run: |
          echo "Environment:    prod"
          echo "Static Web App: ${{ steps.deploy.outputs.STATIC_WEB_APP_HOSTNAME }}"
          echo "App Service:    ${{ steps.deploy.outputs.APP_SERVICE_HOSTNAME }}"
