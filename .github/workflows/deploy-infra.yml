name: Deploy Infrastructure (Bicep)

on:
  push:
    branches: [main]
    paths:
      - "bicep/**"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create Resource Group
        run: az group create --name "rg-ghcsdk" --location "eastus2"

      - name: Deploy Bicep
        id: deploy
        working-directory: bicep
        run: |
          result=$(az deployment group create \
            -g "rg-ghcsdk" \
            --template-file main.bicep \
            --parameters main.bicepparam \
            --query "properties.outputs" \
            -o json)
          echo "STATIC_WEB_APP_HOSTNAME=$(echo $result | jq -r '.staticWebAppHostname.value')" >> $GITHUB_OUTPUT
          echo "APP_SERVICE_HOSTNAME=$(echo $result | jq -r '.appServiceHostname.value')" >> $GITHUB_OUTPUT
          echo "KEY_VAULT_NAME=$(echo $result | jq -r '.keyVaultName.value')" >> $GITHUB_OUTPUT
          echo "APP_INSIGHTS_NAME=$(echo $result | jq -r '.appInsightsName.value')" >> $GITHUB_OUTPUT

      - name: Print Resource Details
        run: |
          echo "Static Web App: ${{ steps.deploy.outputs.STATIC_WEB_APP_HOSTNAME }}"
          echo "App Service:    ${{ steps.deploy.outputs.APP_SERVICE_HOSTNAME }}"
          echo "Key Vault:      ${{ steps.deploy.outputs.KEY_VAULT_NAME }}"
          echo "App Insights:   ${{ steps.deploy.outputs.APP_INSIGHTS_NAME }}"
